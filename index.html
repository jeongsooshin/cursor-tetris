<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-container">
    <div class="board-wrapper">
      <canvas id="game-board" width="300" height="600" aria-label="테트리스 게임 보드"></canvas>

      <div id="game-over" class="game-over hidden" aria-hidden="true">
        <p class="game-over-text">게임 오버</p>
        <button id="restart-btn" type="button">다시 시작</button>
      </div>
    </div>

    <aside class="score-panel">
      <h1 class="game-title">TETRIS</h1>

      <section class="score-section">
        <h2>점수</h2>
        <p id="score" class="score-value">0</p>
      </section>

      <section class="score-section">
        <h2>레벨</h2>
        <p id="level" class="score-value">1</p>
      </section>

      <section class="score-section">
        <h2>라인</h2>
        <p id="lines" class="score-value">0</p>
      </section>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
